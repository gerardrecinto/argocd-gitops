name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Package manifests
        run: zip -r argocd-gitops-${{ github.ref_name }}.zip . --exclude '.git/*' --exclude '.github/*'

      - uses: softprops/action-gh-release@v2
        with:
          files: argocd-gitops-${{ github.ref_name }}.zip
          generate_release_notes: true
