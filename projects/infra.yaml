apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: Cluster-scoped infrastructure addons (cert-manager, ingress, monitoring)
  sourceRepos:
    - https://github.com/gerardrecinto/argocd-gitops
    - https://charts.jetstack.io
    - https://kubernetes.github.io/ingress-nginx
    - https://prometheus-community.github.io/helm-charts
    - https://metallb.github.io/metallb
  destinations:
    - server: "*"
      namespace: cert-manager
    - server: "*"
      namespace: ingress-nginx
    - server: "*"
      namespace: monitoring
    - server: "*"
      namespace: metallb-system
    - server: "*"
      namespace: kube-system
  clusterResourceWhitelist:
    - group: "*"
      kind: ClusterRole
    - group: "*"
      kind: ClusterRoleBinding
    - group: "*"
      kind: CustomResourceDefinition
    - group: "*"
      kind: ValidatingWebhookConfiguration
    - group: "*"
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: platform-admin
      policies:
        - p, proj:infra:platform-admin, applications, *, infra/*, allow
      groups:
        - PLACEHOLDER_PLATFORM_GROUP
